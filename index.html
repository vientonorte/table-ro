<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BuJo Application</title>
</head>
<body>
    <h1>BuJo Integration</h1>
    <div id="admin">
        <h2>Admin Section</h2>
        <label for="apiKey">Claude API Key:</label>
        <input type="text" id="apiKey" />
        <button id="saveApiKey">Save API Key</button>
    </div>

    <script>
        document.getElementById('saveApiKey').addEventListener('click', function() {
            const apiKey = document.getElementById('apiKey').value;
            localStorage.setItem('claudeApiKey', apiKey);
            alert('API key saved securely!');
        });

        function handleFiles(files) {
            const apiKey = localStorage.getItem('claudeApiKey');
            if (!apiKey) {
                alert('API key not found! Please set it in the admin section.');
                return;
            }
            const formData = new FormData();
            for (let file of files) {
                formData.append('images', file);
            }

            fetch('https://api.claude.com/vision', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${apiKey}`
                },
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                populateTaskList(data);
            })
            .catch((error) => {
                console.error('Error:', error);
            });
        }

        function populateTaskList(data) {
            const taskList = document.getElementById('taskList');
            data.tasks.forEach(task => {
                let listItem = document.createElement('li');
                switch(task.symbol) {
                    case '●':
                        listItem.className = 'personal';
                        break;
                    case '◆':
                        listItem.className = 'vinculos';
                        break;
                    case '○':
                        listItem.className = 'bienestar';
                        break;
                    case '*':
                    case '>':
                        listItem.className = 'trabajo';
                        break;
                    default:
                        listItem.className = 'default';
                        break;
                }
                listItem.textContent = task.description;
                taskList.appendChild(listItem);
            });
        }
    </script>
    <ul id="taskList"></ul>
</body>
</html>
