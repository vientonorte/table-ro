name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Prettier
        run: npm install --global prettier@3

      - name: Check formatting (HTML)
        run: prettier --check "index.html" "bujo-admin.html" --config .prettierrc.json

      - name: Check JS syntax
        run: node --check js/app.js

      - name: Check auth-passkey.js syntax
        run: node --check js/auth-passkey.js

      - name: Check SW syntax
        run: node --check sw.js

      - name: Verify CSP allows inline onclick handlers
        run: grep -q "script-src-attr 'unsafe-inline'" index.html

      - name: QA smoke (static + buttons)
        run: |
          npm install --no-save playwright@1.49
          npx playwright install chromium
          node scripts/qa-smoke.mjs

  a11y:
    name: Accessibility (pa11y)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pa11y-ci and serve
        run: npm install --no-save --legacy-peer-deps pa11y-ci@3 serve@14

      - name: Run pa11y WCAG2AA
        run: |
          npx serve . -l 3456 &
          sleep 3
          npx pa11y-ci --config .pa11yci.json